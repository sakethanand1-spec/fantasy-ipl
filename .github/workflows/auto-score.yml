name: Auto Score IPL Matches

on:
  workflow_dispatch: # Manual trigger only — auto-scoring now handled by Vercel cron (/api/cron/score)

jobs:
  auto-score:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clean stale node_modules
        run: rm -rf node_modules
        working-directory: scripts

      - name: Verify script and node version
        run: |
          node --version
          head -5 auto-score.js
        working-directory: scripts

      - name: Run auto-scorer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}
        run: node auto-score.js
        working-directory: scripts
